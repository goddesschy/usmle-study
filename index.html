<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USMLE Step 2 CK Study</title>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0e1117;
    --bg2:      #161b27;
    --bg3:      #1d2435;
    --border:   rgba(255,255,255,0.08);
    --border2:  rgba(255,255,255,0.15);
    --text:     #e8eaf0;
    --text2:    #9ba3b5;
    --text3:    #5c6478;
    --accent:   #4f8ef7;
    --accent2:  #2d6be4;
    --green:    #3ecf8e;
    --red:      #f5645a;
    --amber:    #f5a623;
    --purple:   #a78bfa;
    --radius:   10px;
    --shadow:   0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── 레이아웃 ── */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 56px 1fr;
    min-height: 100vh;
  }

  /* ── 헤더 ── */
  header {
    grid-column: 1 / -1;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
  }
  .logo {
    font-family: 'Bitter', serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--accent);
    letter-spacing: -0.3px;
  }
  .logo span { color: var(--text2); font-weight: 400; font-size: 13px; margin-left: 6px; }
  .header-stats {
    margin-left: auto;
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .stat-pill {
    font-size: 12px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .stat-pill strong { color: var(--text); font-weight: 600; }
  .conn-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  .conn-dot.off { background: var(--red); box-shadow: 0 0 6px var(--red); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* ── 사이드바 ── */
  aside {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .sidebar-section {
    padding: 14px 16px 8px;
  }
  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* 과목 리스트 */
  .subject-list { list-style: none; }
  .subject-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    transition: all 0.15s;
    margin-bottom: 1px;
  }
  .subject-item:hover { background: var(--bg3); color: var(--text); }
  .subject-item.active { background: rgba(79,142,247,0.15); color: var(--accent); }
  .subject-item .icon { font-size: 14px; flex-shrink: 0; }
  .subject-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .subject-item .size { font-size: 11px; color: var(--text3); flex-shrink: 0; }

  /* 검색 */
  .search-box {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    margin-bottom: 10px;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text3); }

  /* ── 메인 ── */
  main {
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  /* ── 툴바 ── */
  .toolbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .toolbar-label {
    font-size: 12px;
    color: var(--text3);
    white-space: nowrap;
  }
  .num-input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 13px;
    padding: 6px 10px;
    width: 90px;
    outline: none;
  }
  .num-input:focus { border-color: var(--accent); }

  .btn {
    padding: 7px 16px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; }
  .btn-ghost { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  .btn-green { background: rgba(62,207,142,0.15); color: var(--green); border: 1px solid rgba(62,207,142,0.3); }
  .btn-green:hover { background: rgba(62,207,142,0.25); }
  .btn-red { background: rgba(245,100,90,0.15); color: var(--red); border: 1px solid rgba(245,100,90,0.3); }
  .btn-red:hover { background: rgba(245,100,90,0.25); }
  .btn-purple { background: rgba(167,139,250,0.15); color: var(--purple); border: 1px solid rgba(167,139,250,0.3); }
  .btn-purple:hover { background: rgba(167,139,250,0.25); }

  .divider { width: 1px; height: 20px; background: var(--border); }

  /* ── 컨텐츠 영역 ── */
  .content {
    flex: 1;
    padding: 24px;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── 초기 화면 ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 400px;
    text-align: center;
    gap: 12px;
  }
  .welcome-icon { font-size: 48px; margin-bottom: 8px; }
  .welcome h2 { font-family: 'Bitter', serif; font-size: 22px; color: var(--text); }
  .welcome p { color: var(--text2); font-size: 14px; max-width: 360px; line-height: 1.7; }

  /* ── 연결 안됨 배너 ── */
  .no-server {
    background: rgba(245,166,35,0.1);
    border: 1px solid rgba(245,166,35,0.3);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--amber);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ── 로딩 ── */
  .loading-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    gap: 16px;
    color: var(--text2);
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-msg { font-size: 14px; color: var(--accent); }
  .loading-sub { font-size: 12px; color: var(--text3); }

  /* ── 카드 ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
  }
  .card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* 문제 헤더 */
  .q-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .badge {
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
  }
  .badge-blue { background: rgba(79,142,247,0.15); color: var(--accent); border: 1px solid rgba(79,142,247,0.3); }
  .badge-green { background: rgba(62,207,142,0.15); color: var(--green); border: 1px solid rgba(62,207,142,0.3); }
  .badge-red { background: rgba(245,100,90,0.15); color: var(--red); border: 1px solid rgba(245,100,90,0.3); }
  .badge-amber { background: rgba(245,166,35,0.15); color: var(--amber); border: 1px solid rgba(245,166,35,0.3); }
  .badge-purple { background: rgba(167,139,250,0.15); color: var(--purple); border: 1px solid rgba(167,139,250,0.3); }

  /* 문제 본문 */
  .q-body {
    font-family: 'Bitter', serif;
    font-size: 15px;
    line-height: 1.85;
    color: var(--text);
    white-space: pre-wrap;
  }

  /* 정답 공개 버튼 */
  .reveal-wrap {
    text-align: center;
    padding: 24px 0 8px;
  }
  .reveal-btn {
    padding: 12px 32px;
    background: linear-gradient(135deg, #2d6be4, #4f8ef7);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(79,142,247,0.3);
  }
  .reveal-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,142,247,0.4); }

  /* 정답 */
  .answer-card {
    background: rgba(62,207,142,0.07);
    border: 1px solid rgba(62,207,142,0.25);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 14px;
  }
  .answer-text {
    font-family: 'Bitter', serif;
    font-size: 16px;
    font-weight: 600;
    color: #6ee7b7;
  }

  /* 해설 */
  .explanation {
    font-size: 14px;
    line-height: 1.85;
    color: var(--text2);
    white-space: pre-wrap;
  }
  .explanation strong { color: var(--text); }

  /* PDF 이미지 알림 */
  .img-notice {
    background: rgba(245,166,35,0.08);
    border: 1px solid rgba(245,166,35,0.25);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--amber);
    margin-bottom: 14px;
  }

  /* 한글 번역 */
  .korean-section {
    font-size: 14px;
    line-height: 1.85;
    color: #bae6fd;
    white-space: pre-wrap;
  }
  .korean-section h3 {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    margin: 14px 0 6px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  /* 채점 버튼 */
  .score-wrap {
    display: flex;
    gap: 10px;
    justify-content: center;
    padding: 8px 0;
  }

  /* 숨김/보임 */
  .hidden { display: none !important; }

  /* 오류 */
  .error-card {
    background: rgba(245,100,90,0.08);
    border: 1px solid rgba(245,100,90,0.3);
    border-radius: var(--radius);
    padding: 16px 20px;
    color: var(--red);
    font-size: 13px;
    white-space: pre-wrap;
  }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border2); }
</style>
</head>
<body>

<div class="layout">

  <!-- ── 헤더 ── -->
  <header>
    <div class="logo">USMLE Step 2 CK <span>Study System</span></div>
    <div class="header-stats">
      <div class="stat-pill">
        <div class="conn-dot off" id="connDot"></div>
        <span id="connLabel">서버 연결 중...</span>
      </div>
      <div class="stat-pill">✅ <strong id="statCorrect">0</strong></div>
      <div class="stat-pill">❌ <strong id="statWrong">0</strong></div>
      <div class="stat-pill">🎯 <strong id="statPct">-</strong></div>
    </div>
  </header>

  <!-- ── 사이드바 ── -->
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-label">과목 선택</div>
      <input class="search-box" type="text" placeholder="과목 검색..." id="subjectSearch" oninput="filterSubjects()">
      <ul class="subject-list" id="subjectList">
        <li style="color:var(--text3);font-size:13px;padding:8px 10px;">로드 중...</li>
      </ul>
    </div>
  </aside>

  <!-- ── 메인 ── -->
  <main>
    <!-- 툴바 -->
    <div class="toolbar">
      <span class="toolbar-label">문제 번호</span>
      <input class="num-input" type="number" id="itemInput" min="1" placeholder="Item #"
        onkeydown="if(event.key==='Enter') loadQuestion()">

      <span class="toolbar-label">페이지</span>
      <input class="num-input" type="number" id="pageInput" min="1" placeholder="Page #"
        onkeydown="if(event.key==='Enter') loadByPage()">

      <button class="btn btn-primary" onclick="loadQuestion()" id="loadBtn">
        ▶ 불러오기
      </button>

      <div class="divider"></div>

      <button class="btn btn-ghost" onclick="prevQuestion()" id="prevBtn">← 이전</button>
      <button class="btn btn-ghost" onclick="nextQuestion()" id="nextBtn">다음 →</button>
    </div>

    <!-- 컨텐츠 -->
    <div class="content" id="content">
      <!-- 서버 없음 배너 -->
      <div class="no-server hidden" id="noServerBanner">
        ⚠ 서버 연결 안됨 — <code>run.bat</code> 을 실행한 후 새로고침하세요
      </div>

      <!-- 초기 화면 -->
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">📖</div>
        <h2>과목을 선택하세요</h2>
        <p>왼쪽에서 과목을 선택하고 문제 번호를 입력하면<br>AI가 문제를 분석해드립니다</p>
      </div>

      <!-- 로딩 -->
      <div class="loading-wrap hidden" id="loadingScreen">
        <div class="spinner"></div>
        <div class="loading-msg" id="loadingMsg">Claude가 분석 중...</div>
        <div class="loading-sub" id="loadingSub"></div>
      </div>

      <!-- 오류 -->
      <div class="error-card hidden" id="errorCard"></div>

      <!-- 문제 영역 -->
      <div id="questionArea" class="hidden">

        <!-- 문제 헤더 -->
        <div class="q-header" id="qHeader"></div>

        <!-- 문제 카드 -->
        <div class="card">
          <div class="card-label">📝 Question</div>
          <div class="q-body" id="qBody"></div>

          <!-- 정답 공개 버튼 -->
          <div class="reveal-wrap" id="revealWrap">
            <button class="reveal-btn" onclick="revealAnswer()">정답 / 해설 보기 ↓</button>
          </div>
        </div>

        <!-- 정답 + 해설 (처음엔 숨김) -->
        <div id="answerSection" class="hidden">

          <!-- 정답 -->
          <div class="answer-card">
            <div class="card-label" style="margin-bottom:8px">✅ Correct Answer</div>
            <div class="answer-text" id="answerText"></div>
          </div>

          <!-- 채점 -->
          <div class="card">
            <div class="card-label">채점</div>
            <div class="score-wrap">
              <button class="btn btn-green" onclick="markScore(true)">✅ 맞았다</button>
              <button class="btn btn-red" onclick="markScore(false)">❌ 틀렸다</button>
            </div>
            <div id="scoreFeedback" style="text-align:center;font-size:13px;margin-top:10px;min-height:18px;"></div>
          </div>

          <!-- PDF 이미지 알림 -->
          <div class="img-notice hidden" id="imgNotice"></div>

          <!-- 해설 -->
          <div class="card">
            <div class="card-label">💡 Explanation (English)</div>
            <div class="explanation" id="explanationText"></div>
          </div>

          <!-- 한글 번역 버튼 / 섹션 -->
          <div class="card">
            <div class="card-label">🇰🇷 한글 번역</div>
            <div id="koreanWrap">
              <button class="btn btn-purple" onclick="loadKorean()" id="koreanBtn">
                번역 불러오기
              </button>
            </div>
            <div class="korean-section hidden" id="koreanSection"></div>
          </div>

        </div><!-- /answerSection -->

      </div><!-- /questionArea -->

    </div><!-- /content -->
  </main>

</div><!-- /layout -->

<script>
// ── 설정 ────────────────────────────────────────────────────────────────────
const SERVER = 'http://localhost:8765';

// ── 상태 ────────────────────────────────────────────────────────────────────
let state = {
  subjects: [],
  filteredSubjects: [],
  selectedFile: null,     // abs_path
  selectedName: null,
  totalPages: null,
  currentItem: null,
  currentPages: [],       // 해당 아이템의 페이지 번호들
  serverOk: false,
  progress: {},           // "file:item" -> true/false
  lastRaw: null,          // Claude 원본 응답 (한글 번역에 재사용)
};

// ── 초기화 ──────────────────────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch(`${SERVER}/health`, {signal: AbortSignal.timeout(3000)});
    const d = await r.json();
    state.serverOk = d.status === 'ok';
  } catch(_) {
    state.serverOk = false;
  }

  if (state.serverOk) {
    document.getElementById('connDot').classList.remove('off');
    document.getElementById('connLabel').textContent = '서버 연결됨';
    await loadSubjects();
  } else {
    document.getElementById('noServerBanner').classList.remove('hidden');
  }
}

async function loadSubjects() {
  const r = await fetch(`${SERVER}/subjects`);
  const d = await r.json();
  state.subjects = d.subjects || [];
  state.filteredSubjects = [...state.subjects];
  renderSubjects();
}

// ── 과목 리스트 렌더링 ───────────────────────────────────────────────────────
function renderSubjects() {
  const ul = document.getElementById('subjectList');
  if (!state.filteredSubjects.length) {
    ul.innerHTML = '<li style="color:var(--text3);font-size:13px;padding:8px 10px;">결과 없음</li>';
    return;
  }

  // 그룹별 정리
  const groups = {};
  state.filteredSubjects.forEach(s => {
    const g = s.group || '기타';
    if (!groups[g]) groups[g] = [];
    groups[g].push(s);
  });

  let html = '';
  for (const [group, items] of Object.entries(groups)) {
    // 과목명 추출 (PDFsam 파일은 숫자_PDFsam_과목명 형식)
    const specialties = {};
    items.forEach(s => {
      let key = s.name.replace(/^\d+_PDFsam_/, '').replace(/\s*(block\s*\d+.*|\d+q.*)/i, '').trim();
      if (!specialties[key]) specialties[key] = [];
      specialties[key].push(s);
    });

    for (const [specialty, files] of Object.entries(specialties)) {
      // 파일 여러 개면 첫번째 (or 가장 큰 것)
      const mainFile = files.sort((a,b) => b.size_mb - a.size_mb)[0];
      const icon = mainFile.type === 'zip_jpeg' ? '📦' : '📄';
      const isActive = state.selectedFile === mainFile.abs_path;
      html += `<li class="subject-item ${isActive?'active':''}"
        data-path="${escHtml(mainFile.abs_path)}"
        data-name="${escHtml(specialty)}"
        onclick="selectSubjectEl(this)">
        <span class="icon">${icon}</span>
        <span class="name">${escHtml(specialty)}</span>
        <span class="size">${mainFile.size_mb}M</span>
      </li>`;
    }
  }
  ul.innerHTML = html;
}

function filterSubjects() {
  const q = document.getElementById('subjectSearch').value.toLowerCase();
  state.filteredSubjects = q
    ? state.subjects.filter(s => s.name.toLowerCase().includes(q))
    : [...state.subjects];
  renderSubjects();
}

function escHtml(s) {
  return s.replace(/'/g,"&#39;").replace(/"/g,'&quot;');
}

// ── 과목 선택 (data 속성에서 경로 읽기) ─────────────────────────────────────
function selectSubjectEl(el) {
  const absPath = el.getAttribute('data-path');
  const name = el.getAttribute('data-name');
  selectSubject(absPath, name);
}

async function selectSubject(absPath, name) {
  state.selectedFile = absPath;
  state.selectedName = name;
  state.currentItem = null;

  renderSubjects();

  // 페이지 수 가져오기
  showLoading('파일 정보 확인 중...');
  try {
    const r = await fetch(`${SERVER}/info?file=${encodeURIComponent(absPath)}`);
    const d = await r.json();
    state.totalPages = d.total_pages;
    showWelcome();
    document.getElementById('itemInput').focus();
  } catch(e) {
    showError('파일 정보 로드 실패: ' + e.message);
  }
}

// ── 문제 로드 ────────────────────────────────────────────────────────────────
async function loadQuestion() {
  if (!state.selectedFile) { alert('왼쪽에서 과목을 먼저 선택하세요'); return; }
  const itemNum = parseInt(document.getElementById('itemInput').value);
  if (!itemNum || itemNum < 1) { alert('문제 번호를 입력하세요'); return; }

  await fetchAndDisplay(itemNum);
}

async function loadByPage() {
  if (!state.selectedFile) { alert('왼쪽에서 과목을 먼저 선택하세요'); return; }
  const pageNum = parseInt(document.getElementById('pageInput').value);
  if (!pageNum || pageNum < 1) { alert('페이지 번호를 입력하세요'); return; }

  // 해당 페이지를 Haiku로 스캔해서 Item 번호 찾기
  showLoading(`페이지 ${pageNum} 확인 중...`);
  try {
    const b64 = await fetchPageB64(state.selectedFile, pageNum);
    const result = await callClaude({
      images: [b64],
      text: 'What Item number is shown on this page? Reply ONLY: ITEM:N (e.g. ITEM:4). If not found: ITEM:0',
      model: 'claude-haiku-4-5-20251001',
      maxTokens: 50
    });
    const m = result.match(/ITEM:(\d+)/);
    if (m && parseInt(m[1]) > 0) {
      document.getElementById('itemInput').value = m[1];
      await fetchAndDisplay(parseInt(m[1]), [pageNum]);
    } else {
      // 페이지 번호 그대로 사용
      await fetchAndDisplay(null, [pageNum]);
    }
  } catch(e) {
    showError('페이지 확인 실패: ' + e.message);
  }
}

async function prevQuestion() {
  if (state.currentItem > 1) {
    document.getElementById('itemInput').value = state.currentItem - 1;
    await loadQuestion();
  }
}

async function nextQuestion() {
  if (state.currentItem) {
    document.getElementById('itemInput').value = state.currentItem + 1;
    await loadQuestion();
  }
}

// ── 핵심: 문제 fetch + 표시 ──────────────────────────────────────────────────
async function fetchAndDisplay(itemNum, knownPages = []) {
  showLoading('이미지 로드 중...');

  try {
    // 1. 페이지 찾기 (itemNum 있을 때)
    let pages = knownPages;
    if (itemNum && !pages.length) {
      pages = await findItemPages(itemNum);
    }

    if (!pages.length) {
      showError(`Item ${itemNum}을 찾을 수 없습니다.\n파일: ${state.selectedName}\n총 ${state.totalPages}페이지`);
      return;
    }

    state.currentItem = itemNum;
    state.currentPages = pages;

    // 2. 페이지 이미지 로드
    setLoadingMsg('문제 분석 중 (Claude)...',
      `Item ${itemNum} · 페이지 ${pages.join(',')}`);

    const images = await Promise.all(pages.map(p => fetchPageB64(state.selectedFile, p)));

    // 3. Claude API로 문제+해설 추출
    const raw = await callClaude({
      images,
      text: buildPrompt(itemNum),
      model: 'claude-sonnet-4-20250514',
      maxTokens: 4000
    });

    state.lastRaw = raw;

    // 4. 파싱
    const sections = parseSections(raw);
    displayQuestion(itemNum, pages, sections);

  } catch(e) {
    showError(e.message);
  }
}

async function findItemPages(itemNum) {
  const BATCH = 12;
  const total = state.totalPages || 200;

  for (let start = 0; start < total; start += BATCH) {
    const nums = [];
    for (let i = start; i < Math.min(start + BATCH, total); i++) nums.push(i + 1);

    setLoadingMsg(`Item ${itemNum} 찾는 중...`, `페이지 ${nums[0]}~${nums[nums.length-1]} 스캔`);

    const imgs = await Promise.all(nums.map(p => fetchPageB64(state.selectedFile, p)));
    const result = await callClaude({
      images: imgs,
      text: `Pages ${nums.join(',')} from USMLE PDF. Which pages show "Item ${itemNum} of" in header? Return JSON only: {"pages":[list]} or {"pages":[]}`,
      model: 'claude-haiku-4-5-20251001',
      maxTokens: 200
    });

    try {
      const clean = result.replace(/```json\n?|```\n?/g,'').trim();
      const parsed = JSON.parse(clean);
      if (parsed.pages?.length) return parsed.pages;
    } catch(_) {}
  }
  return [];
}

// ── Claude API ───────────────────────────────────────────────────────────────
async function fetchPageB64(absPath, pageNum) {
  const url = `${SERVER}/page?file=${encodeURIComponent(absPath)}&p=${pageNum}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`페이지 ${pageNum} 로드 실패`);
  const blob = await r.blob();
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(blob);
  });
}

async function callClaude({images=[], text, model='claude-sonnet-4-20250514', maxTokens=4000}) {
  const content = [
    ...images.map(b64 => ({type:'image', source:{type:'base64', media_type:'image/jpeg', data:b64}})),
    {type:'text', text}
  ];
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({model, max_tokens: maxTokens, messages:[{role:'user',content}]})
  });
  if (!r.ok) {
    const e = await r.json().catch(()=>({}));
    throw new Error(`Claude API 오류 ${r.status}: ${e?.error?.message||''}`);
  }
  const d = await r.json();
  return d.content[0].text;
}

function buildPrompt(itemNum) {
  return `You are a USMLE Step 2 CK tutor. These images show Item ${itemNum} from a question bank.

Use EXACTLY these markers:

---QUESTION---
[Complete question stem and answer choices A-E in English, exactly as written]

---ANSWER---
Correct Answer: [Letter]. [Full text]

---EXPLANATION---
[Complete explanation in English, all choices, educational objective]

---PDF_IMAGES---
[Any figures/tables/diagrams in the PDF. Format: **[location] [description]**. Write None if none.]

---END---`;
}

// ── 섹션 파싱 ────────────────────────────────────────────────────────────────
function parseSections(raw) {
  const keys = ['QUESTION','ANSWER','EXPLANATION','PDF_IMAGES','END'];
  const sections = {};
  keys.slice(0,-1).forEach((k,i) => {
    const s = raw.indexOf(`---${k}---`);
    if (s === -1) return;
    const after = s + k.length + 6;
    const nexts = keys.slice(i+1).map(n => raw.indexOf(`---${n}---`, after)).filter(n => n > after);
    const e = nexts.length ? Math.min(...nexts) : raw.length;
    sections[k] = raw.slice(after, e).trim();
  });
  return sections;
}

// ── 화면 표시 ────────────────────────────────────────────────────────────────
function displayQuestion(itemNum, pages, sections) {
  hideAll();
  document.getElementById('questionArea').classList.remove('hidden');
  document.getElementById('answerSection').classList.add('hidden');
  document.getElementById('revealWrap').classList.remove('hidden');
  document.getElementById('koreanSection').classList.add('hidden');
  document.getElementById('koreanBtn').classList.remove('hidden');
  document.getElementById('scoreFeedback').textContent = '';

  // 헤더 배지
  const progressKey = `${state.selectedFile}:${itemNum}`;
  const scored = state.progress[progressKey];
  let scoredBadge = '';
  if (scored === true) scoredBadge = '<span class="badge badge-green">✅ 정답</span>';
  else if (scored === false) scoredBadge = '<span class="badge badge-red">❌ 오답</span>';

  document.getElementById('qHeader').innerHTML = `
    <span class="badge badge-blue">Item #${itemNum}</span>
    <span class="badge badge-amber">${escHtml(state.selectedName)}</span>
    <span style="font-size:11px;color:var(--text3)">pages: ${pages.join(',')}</span>
    ${scoredBadge}
  `;

  // 문제 본문
  document.getElementById('qBody').textContent = sections.QUESTION || '문제를 파싱할 수 없습니다';

  // 정답
  document.getElementById('answerText').textContent = sections.ANSWER || '';

  // 해설
  document.getElementById('explanationText').innerHTML =
    (sections.EXPLANATION || '').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g,'<br>');

  // PDF 이미지 알림
  const imgNotice = document.getElementById('imgNotice');
  if (sections.PDF_IMAGES && sections.PDF_IMAGES !== 'None' && sections.PDF_IMAGES.trim()) {
    imgNotice.classList.remove('hidden');
    imgNotice.innerHTML = '🖼 <strong>PDF 내 이미지:</strong> ' +
      sections.PDF_IMAGES.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  } else {
    imgNotice.classList.add('hidden');
  }

  updateStats();
}

function revealAnswer() {
  document.getElementById('revealWrap').classList.add('hidden');
  document.getElementById('answerSection').classList.remove('hidden');
  document.getElementById('answerSection').scrollIntoView({behavior:'smooth', block:'start'});
}

function markScore(correct) {
  const key = `${state.selectedFile}:${state.currentItem}`;
  state.progress[key] = correct;
  const fb = document.getElementById('scoreFeedback');
  fb.textContent = correct ? '✅ 정답으로 기록됨' : '❌ 오답으로 기록됨';
  fb.style.color = correct ? 'var(--green)' : 'var(--red)';
  updateStats();
  // 헤더 배지 업데이트
  if (state.currentItem) displayBadgeUpdate(correct);
}

function displayBadgeUpdate(correct) {
  const header = document.getElementById('qHeader');
  // 기존 scored 배지 제거 후 추가
  const existing = header.querySelectorAll('.badge-green, .badge-red');
  existing.forEach(e => e.remove());
  const badge = document.createElement('span');
  badge.className = `badge ${correct ? 'badge-green' : 'badge-red'}`;
  badge.textContent = correct ? '✅ 정답' : '❌ 오답';
  header.appendChild(badge);
}

// ── 한글 번역 ────────────────────────────────────────────────────────────────
async function loadKorean() {
  document.getElementById('koreanBtn').classList.add('hidden');
  document.getElementById('koreanSection').classList.remove('hidden');
  document.getElementById('koreanSection').textContent = '번역 중...';

  try {
    const pages = state.currentPages;
    const images = await Promise.all(pages.map(p => fetchPageB64(state.selectedFile, p)));

    const result = await callClaude({
      images,
      text: `Translate this USMLE question (Item ${state.currentItem}) to Korean.

Format:
### 문제
[Korean translation of question stem and choices. Medical terms: 한국어 (English)]

### 해설
[Korean translation of key explanation. Keep important terms bilingual.]

### 핵심 포인트
• [point 1]
• [point 2]
• [point 3]`,
      model: 'claude-sonnet-4-20250514',
      maxTokens: 2000
    });

    const section = document.getElementById('koreanSection');
    section.innerHTML = result
      .replace(/###\s*(.*?)(\n|$)/g, '<h3>$1</h3>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/^•\s(.*)/gm, '<div style="margin:4px 0 4px 12px">• $1</div>')
      .replace(/\n\n/g, '<div style="height:8px"></div>');

  } catch(e) {
    document.getElementById('koreanSection').textContent = '번역 실패: ' + e.message;
  }
}

// ── UI 헬퍼 ──────────────────────────────────────────────────────────────────
function hideAll() {
  ['welcomeScreen','loadingScreen','errorCard','questionArea'].forEach(id => {
    document.getElementById(id).classList.add('hidden');
  });
}

function showWelcome() {
  hideAll();
  document.getElementById('welcomeScreen').classList.remove('hidden');
}

function showLoading(msg, sub='') {
  hideAll();
  document.getElementById('loadingScreen').classList.remove('hidden');
  document.getElementById('loadingMsg').textContent = msg;
  document.getElementById('loadingSub').textContent = sub;
}

function setLoadingMsg(msg, sub='') {
  document.getElementById('loadingMsg').textContent = msg;
  document.getElementById('loadingSub').textContent = sub;
}

function showError(msg) {
  hideAll();
  document.getElementById('errorCard').classList.remove('hidden');
  document.getElementById('errorCard').textContent = '❌ ' + msg;
}

function updateStats() {
  const vals = Object.values(state.progress);
  const correct = vals.filter(v => v === true).length;
  const wrong = vals.filter(v => v === false).length;
  const total = correct + wrong;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statPct').textContent = total ? Math.round(correct/total*100)+'%' : '-';
}

// ── 시작 ─────────────────────────────────────────────────────────────────────
init();
</script>
